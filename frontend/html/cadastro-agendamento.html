<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Agendamento - Helix Health</title>
  <link rel="stylesheet" href="../style/cadastro-agendamento.css">
</head>
<body>
  <main>
    <header>
      <div class="header-actions">
        <a href="portal-usuario.html" class="voltar">Portal</a>
        <a href="listar-agendamento.html" class="voltar">Listar agendamentos</a>
      </div>

      <p class="eyebrow" id="modoPagina">Cadastro</p>
      <h1 id="tituloPagina">Cadastro de Agendamento</h1>
      <p id="descricaoPagina">Informe paciente, profissional, data e horario da consulta.</p>
    </header>

    <form id="formAgendamento">
      <div class="linha">
        <div class="campo">
          <label for="paciente">Paciente</label>
          <select id="paciente" required>
            <option value="">Selecione um paciente</option>
          </select>
        </div>

        <div class="campo">
          <label for="profissional">Profissional</label>
          <select id="profissional" required>
            <option value="">Selecione um profissional</option>
          </select>
        </div>
      </div>

      <div class="linha">
        <div class="campo">
          <label for="dataConsulta">Data da consulta</label>
          <input type="date" id="dataConsulta" required>
        </div>

        <div class="campo">
          <label for="horaConsulta">Hora da consulta</label>
          <input type="time" id="horaConsulta" required>
        </div>
      </div>

      <div class="campo">
        <label for="statusAgendamento">Status</label>
        <select id="statusAgendamento" required>
          <option value="AGENDADO">Agendado</option>
          <option value="CANCELADO">Cancelado</option>
          <option value="REALIZADO">Realizado</option>
          <option value="REMARCADO">Remarcado</option>
        </select>
      </div>

      <div class="campo">
        <label for="observacao">Observacao</label>
        <textarea id="observacao" rows="4"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" id="botaoSalvar">Cadastrar agendamento</button>
        <a href="listar-agendamento.html" class="secondary-link">Cancelar</a>
      </div>
    </form>

    <p id="mensagem"></p>
  </main>

  <script src="../script/auth.js"></script>
  <script src="../script/cadastro-agendamento.js"></script>
</body>
</html>
