<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Prontuario - Helix Health</title>
  <link rel="stylesheet" href="../style/cadastro-prontuario.css">
</head>
<body>
  <main>
    <header>
      <div class="header-actions">
        <a href="portal-usuario.html" class="voltar">Portal</a>
        <a href="listar-prontuario.html" class="voltar">Listar prontuarios</a>
      </div>

      <p class="eyebrow" id="modoPagina">Cadastro</p>
      <h1 id="tituloPagina">Cadastro de Prontuario</h1>
      <p id="descricaoPagina">Registre as informacoes principais do atendimento do paciente.</p>
    </header>

    <form id="formProntuario">
      <div class="linha">
        <div class="campo">
          <label for="paciente">Paciente</label>
          <select id="paciente" required>
            <option value="">Selecione um paciente</option>
          </select>
        </div>

        <div class="campo">
          <label for="profissional">Profissional</label>
          <select id="profissional" required>
            <option value="">Selecione um profissional</option>
          </select>
        </div>
      </div>

      <div class="campo">
        <label for="dataAtendimento">Data do atendimento</label>
        <input type="date" id="dataAtendimento" required>
      </div>

      <div class="campo">
        <label for="sintomas">Sintomas</label>
        <textarea id="sintomas" rows="4" required></textarea>
      </div>

      <div class="campo">
        <label for="diagnostico">Diagnostico</label>
        <textarea id="diagnostico" rows="4"></textarea>
      </div>

      <div class="campo">
        <label for="prescricao">Prescricao</label>
        <textarea id="prescricao" rows="4"></textarea>
      </div>

      <div class="campo">
        <label for="observacoes">Observacoes</label>
        <textarea id="observacoes" rows="4"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" id="botaoSalvar">Cadastrar prontuario</button>
        <a href="listar-prontuario.html" class="secondary-link">Cancelar</a>
      </div>
    </form>

    <p id="mensagem"></p>
  </main>

  <script src="../script/auth.js"></script>
  <script src="../script/cadastro-prontuario.js?v=2"></script>
</body>
</html>
