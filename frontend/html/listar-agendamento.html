<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamentos - Helix Health</title>
  <link rel="stylesheet" href="../style/listar-agendamento.css">
</head>
<body>
  <header class="topbar">
    <a href="portal-usuario.html" class="brand">Helix Health</a>

    <nav class="menu">
      <a href="portal-usuario.html">Portal</a>
      <a href="cadastro-agendamento.html">Cadastrar agendamento</a>
      <a href="#" id="botaoSair">Sair</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-header">
      <div>
        <p class="eyebrow">Agenda</p>
        <h1>Agendamentos</h1>
        <p class="subtitle">Acompanhe consultas marcadas, remarcadas, realizadas e canceladas.</p>
      </div>

      <a class="primary-link" href="cadastro-agendamento.html">Novo agendamento</a>
    </section>

    <section class="table-panel">
      <div class="table-toolbar">
        <span id="totalAgendamentos">0 agendamentos encontrados</span>
        <button type="button" id="botaoAtualizar">Atualizar</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Paciente</th>
              <th>Profissional</th>
              <th>Data</th>
              <th>Hora</th>
              <th>Status</th>
              <th>Observacao</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="tabelaAgendamentos">
            <tr>
              <td colspan="8" class="empty">Carregando agendamentos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <p id="mensagem"></p>
  </main>

  <script src="../script/auth.js?v=6"></script>
  <script src="../script/listar-agendamento.js?v=2"></script>
</body>
</html>
