<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exames - Helix Health</title>
  <link rel="stylesheet" href="../style/listar-exame.css">
</head>
<body>
  <header class="topbar">
    <a href="portal-usuario.html" class="brand">Helix Health</a>

    <nav class="menu">
      <a href="portal-usuario.html">Portal</a>
      <a href="cadastro-exame.html">Cadastrar exame</a>
      <a href="portal-seletor.html">Trocar portal</a>
      <a href="#" id="botaoSair">Sair</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-header">
      <div>
        <p class="eyebrow">Exames</p>
        <h1>Lista de exames</h1>
        <p class="subtitle">Acompanhe solicitacoes, status e resultados registrados para os pacientes.</p>
      </div>

      <a class="primary-link" href="cadastro-exame.html">Novo exame</a>
    </section>

    <section class="filter-panel">
      <div class="filter-field">
        <label for="filtroPaciente">Paciente</label>
        <select id="filtroPaciente">
          <option value="">Todos os pacientes</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="filtroProfissional">Profissional</label>
        <select id="filtroProfissional">
          <option value="">Todos os profissionais</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="filtroStatus">Status</label>
        <select id="filtroStatus">
          <option value="">Todos os status</option>
          <option value="SOLICITADO">Solicitado</option>
          <option value="EM_ANALISE">Em analise</option>
          <option value="CONCLUIDO">Concluido</option>
          <option value="CANCELADO">Cancelado</option>
        </select>
      </div>

      <div class="filter-actions">
        <button type="button" id="botaoFiltrar">Filtrar</button>
        <button type="button" id="botaoLimparFiltro">Limpar</button>
      </div>
    </section>

    <section class="table-panel">
      <div class="table-toolbar">
        <span id="totalExames">0 exames encontrados</span>
        <button type="button" id="botaoAtualizar">Atualizar</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Paciente</th>
              <th>Profissional</th>
              <th>Tipo</th>
              <th>Status</th>
              <th>Solicitacao</th>
              <th>Resultado</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="tabelaExames">
            <tr>
              <td colspan="8" class="empty">Carregando exames...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <p id="mensagem"></p>
  </main>

  <script src="../script/auth.js?v=6"></script>
  <script src="../script/listar-exame.js"></script>
</body>
</html>
