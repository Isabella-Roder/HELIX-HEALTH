<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacientes - Helix Health</title>
  <link rel="stylesheet" href="../style/listar-paciente.css">
</head>
<body>
  <header class="topbar">
    <a href="portal-usuario.html" class="brand">Helix Health</a>

    <nav class="menu">
      <a href="portal-usuario.html">Portal</a>
      <a href="cadastro-paciente.html">Cadastrar paciente</a>
      <a href="#" id="botaoSair">Sair</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-header">
      <div>
        <p class="eyebrow">Atendimento</p>
        <h1>Pacientes cadastrados</h1>
        <p class="subtitle">Consulte os dados principais dos pacientes registrados.</p>
      </div>

      <a class="primary-link" href="cadastro-paciente.html">Novo paciente</a>
    </section>

    <section class="table-panel">
      <div class="table-toolbar">
        <span id="totalPacientes">0 pacientes encontrados</span>
        <button type="button" id="botaoAtualizar">Atualizar</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Nome social</th>
              <th>CPF</th>
              <th>Telefone</th>
              <th>Sexo</th>
              <th>Genero</th>
              <th>Convenio</th>
              <th>Nascimento</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="tabelaPacientes">
            <tr>
              <td colspan="10" class="empty">Carregando pacientes...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <p id="mensagem"></p>
  </main>

  <script src="../script/auth.js"></script>
  <script src="../script/listar-paciente.js"></script>
</body>
</html>
