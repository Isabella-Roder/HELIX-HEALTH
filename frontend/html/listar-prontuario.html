<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prontuarios - Helix Health</title>
  <link rel="stylesheet" href="../style/listar-prontuario.css">
</head>
<body>
  <header class="topbar">
    <a href="portal-usuario.html" class="brand">Helix Health</a>

    <nav class="menu">
      <a href="portal-usuario.html">Portal</a>
      <a href="cadastro-prontuario.html">Cadastrar prontuario</a>
      <a href="#" id="botaoSair">Sair</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-header">
      <div>
        <p class="eyebrow">Atendimento</p>
        <h1>Prontuarios</h1>
        <p class="subtitle">Consulte sintomas, diagnosticos, prescricoes e observacoes registradas.</p>
      </div>

      <a class="primary-link" href="cadastro-prontuario.html">Novo prontuario</a>
    </section>

    <section class="table-panel">
      <div class="table-toolbar">
        <span id="totalProntuarios">0 prontuarios encontrados</span>
        <button type="button" id="botaoAtualizar">Atualizar</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Paciente</th>
              <th>Profissional</th>
              <th>Data</th>
              <th>Sintomas</th>
              <th>Diagnostico</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="tabelaProntuarios">
            <tr>
              <td colspan="7" class="empty">Carregando prontuarios...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <p id="mensagem"></p>
  </main>

  <script src="../script/auth.js"></script>
  <script src="../script/listar-prontuario.js"></script>
</body>
</html>
