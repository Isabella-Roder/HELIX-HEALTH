<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Helix Health</title>
  <link rel="stylesheet" href="../style/login.css">
</head>
<body>
  <main>
    <h1>Login</h1>

    <form id="formLogin">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>

      <div>
        <label for="senha">Senha</label>
        <input type="password" id="senha" required>
      </div>

      <button type="submit">Entrar</button>
    </form>

    <a class="create-account" href="cadastro-paciente-acesso.html">Criar acesso de paciente</a>

    <p id="mensagem"></p>
  </main>

  <script src="../script/login.js?v=3"></script>
</body>
</html>
